syntax = "proto3";

package config;

// Configuration file for ProcMon detector
message ProcMonConfig {
    // setuid hook config.
    HookConfig setuid = 1;
    // capset hook config.
    HookConfig capset = 2;
    // prctl hook config.
    HookConfig prctl = 3;
    // create_user_ns hook config.
    HookConfig create_user_ns = 4;
    // ptrace_attach hook config.
    HookConfig ptrace_access_check = 5;
    // setgid hook config.
    HookConfig setgid = 6;
    // bprm_check hook config.
    HookConfig bprm_check = 7;
    // Collect IMA hashes for executed binaries.
    optional bool ima_hash = 8;
    // GC period for PROCMON_PROC_MAP default 30 sec.
    optional uint64 gc_period = 9;
}

// Configuration file for FileMon detector.
message FileMonConfig {
    // security_file_open config.
    HookConfig file_open = 1;
    // security_path_truncate config.
    HookConfig path_truncate = 2;
    // security_path_unlink config.
    HookConfig path_unlink = 3;
    // security_path_symlink config.
    HookConfig path_symlink = 4;
    // security_path_chmod config.
    HookConfig path_chmod = 5;
    // security_path_chown config.
    HookConfig path_chown = 6;
    // security_sb_mount config.
    HookConfig sb_mount = 7;
    // security_mmap_file config.
    HookConfig mmap_file = 8;
    // security_file_ioctl config.
    HookConfig file_ioctl = 9;
}

// Configuration file for KernelMon detector.
message KernelMonConfig {
    // Getting access to bpf map
    HookConfig bpf_map = 1;
    // Creating bpf map
    HookConfig bpf_map_create = 2;
    // Getting access to bpf program
    HookConfig bpf_prog = 3;
    // Creating to bpf program
    HookConfig bpf_prog_load = 4;
}

// Configuration file for NetMon detector.
message NetMonConfig {
    // Ingress traffic connections
    HookConfig ingress = 1;
    // Egress traffic connections
    HookConfig egress = 2;
    // Socket creation
    HookConfig socket_create = 3;
    // Connect over socket
    HookConfig socket_connect = 4;
}

// Configuration file for SysEnumMon detector.
message SysEnumMonConfig {
    // Number of unique observations needed within the window to raise an alert.
    uint32 chain_size = 1;
    // Sliding window length in seconds.
    uint64 window_size_sec = 2;
    // Binary names observed on execve.
    SysEnumMonBins bprm_check = 3;
    // File paths observed on file_open.
    SysEnumMonFiles file_open = 4;
}

// List of binary names.
message SysEnumMonBins {
    repeated string name = 1;
}

// List of file paths and path prefixes.
message SysEnumMonFiles {
    repeated string path = 1;
    repeated string path_prefix = 2;
}

// Rule definition. Scope and event predicates are used as logical conjunction.
message Rule {
    // Name of the rule.
    string name = 1;
    // Logical predicate describes scope this rule will be applied, e.g. process, container.
    string scope = 2;
    // Logical predicate for describes event rule will be applied
    string event = 3;
}

// Hook or group of hooks configuration
message HookConfig {
    // Load eBPF programs
    bool enabled = 1;
    // Sandbox capabilities.
    SandboxMode sandbox = 2;
    // Filtering rules
    repeated Rule rules = 3;
}

// Sandbox  parameters.
message SandboxMode {
    // Enable sandbox mode.
    bool enabled = 1;
    // Consider rules as deny list.
    bool deny_list = 2;
}