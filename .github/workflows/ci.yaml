name: CI
on:
  pull_request:
  push:
    branches:
      - "main"

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: clippy rustfmt

      - name: Lint
        run: |
          cargo clippy --workspace --all-features -- -D warnings
          cargo fmt --all -- --check
          cd bombini-detectors-ebpf
          cargo clippy --workspace --all-features -- -D warnings
          cargo fmt --all -- --check

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: lima-vm/lima-actions/setup@v1
        id: lima-actions-setup

      - uses: actions/cache@v4
        with:
          path: ~/.cache/lima
          key: lima-${{ steps.lima-actions-setup.outputs.version }}

      - run: limactl start --plain --name=default --cpus=1 --memory=1 template://ubuntu-lts

      - uses: actions/cache@v4
        with:
          path: ~/.cache/lima-vm-setup
          key: lima-vm-setup-${{ runner.os }}-v1
          restore-keys: |
            lima-vm-setup-${{ runner.os }}-v1

      - name: Configure VM
        run: |
          ssh lima-default 'sudo sed -i '\''s/^\(GRUB_CMDLINE_LINUX=\)"[^"]*"/\1"lsm=bpf,integrity ima_policy=tcb"/'\'' /etc/default/grub || echo "GRUB_CMDLINE_LINUX=\"lsm=bpf,integrity ima_policy=tcb\""' /etc/default/grub
          ssh lima-default sudo update-grub
          ssh lima-default 'sudo apt update && sudo apt install -y clang'
          ssh lima-default 'curl -L https://github.com/libbpf/bpftool/releases/download/v7.6.0/bpftool-v7.6.0-amd64.tar.gz -o /tmp/bpftool.tar.gz && sudo tar -xvf /tmp/bpftool.tar.gz -C /usr/local/bin && sudo chmod +x /usr/local/bin/bpftool && rm /tmp/bpftool.tar.gz'
          ssh lima-default 'curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y'
          ssh lima-default 'source ~/.cargo/env && rustup toolchain install nightly --component rust-src'
          ssh lima-default 'source ~/.cargo/env && cargo install bpf-linker bindgen-cli'
          ssh lima-default 'source ~/.cargo/env && cargo install --git https://github.com/aya-rs/aya aya-tool'
          
          mkdir -p ~/.cache/lima-vm-setup
          touch ~/.cache/lima-vm-setup/configured
          limactl stop

      - name: Build and Run tests
        run: |
          limactl start
          rsync -a -e ssh . lima-default:/tmp/repo
          ssh lima-default "cd /tmp/repo && source ~/.cargo/env && cargo xtask vmlinux-gen && cargo xtask test --release"

      - name: Get Bombini logs from lima VM
        if: failure()
        run: |
          rsync -a -e ssh 'lima-default:/tmp/bombini-test-*' /tmp

      - name: Upload Bombini logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bombini-logs
          path: /tmp/bombini-test-*
          retention-days: 5