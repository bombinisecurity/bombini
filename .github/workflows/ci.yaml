          ssh lima-ubuntu-kernel-v6-8 sudo update-grub
          ssh lima-ubuntu-kernel-v6-8 'curl -L https://github.com/bpftrace/bpftrace/releases/download/v0.24.0/bpftrace -o bpftrace && chmod +x bpftrace && sudo mv bpftrace /usr/local/bin/bpftrace'

          limactl stop ubuntu-kernel-v6.8

      - name: Run tests on kernel 6.8
        run: |
          limactl start ubuntu-kernel-v6.8

          # Transfer pre-built artifacts
          rsync -a -e ssh /tmp/bombini-build lima-ubuntu-kernel-v6-8:/tmp/

          ssh lima-ubuntu-kernel-v6-8 'uname -a'
          ssh lima-ubuntu-kernel-v6-8 "chmod +x /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/bombini"
          ssh lima-ubuntu-kernel-v6-8 "chmod +x /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/tests-*"
          ssh lima-ubuntu-kernel-v6-8 "chmod +x /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/filemon-*"
          ssh lima-ubuntu-kernel-v6-8 "chmod +x /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/kernelmon-*"
          ssh lima-ubuntu-kernel-v6-8 "chmod +x /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/netmon-*"
          ssh lima-ubuntu-kernel-v6-8 "chmod +x /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/procmon-*"
          ssh lima-ubuntu-kernel-v6-8 "chmod +x /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/sandbox-*"

          # Run tests
          ssh lima-ubuntu-kernel-v6-8 "sudo /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/tests-* --test-threads 1 test_6_2_ test_6_8_"
          ssh lima-ubuntu-kernel-v6-8 "sudo /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/filemon-* --test-threads 1 test_6_2_ test_6_8_"
          ssh lima-ubuntu-kernel-v6-8 "sudo /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/kernelmon-* --test-threads 1 test_6_2_ test_6_8_"
          ssh lima-ubuntu-kernel-v6-8 "sudo /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/netmon-* --test-threads 1 test_6_2_ test_6_8_"
          ssh lima-ubuntu-kernel-v6-8 "sudo /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/procmon-* --test-threads 1 test_6_2_ test_6_8_"
          ssh lima-ubuntu-kernel-v6-8 "sudo /tmp/bombini-build/target/x86_64-unknown-linux-musl/release/deps/sandbox-* --test-threads 1 test_6_2_ test_6_8_"

          limactl stop ubuntu-kernel-v6.8

      - name: Get Bombini logs from lima VM
        if: failure()
        run: |
          rsync -a -e ssh 'lima-ubuntu-kernel-v6-8:/tmp/bombini-test-*' /tmp

      - name: Upload Bombini logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bombini-logs-ubuntu-kernel-v6_8
          path: /tmp/bombini-test-*
          retention-days: 3

