bprm_check:
  enabled: true
  sandbox:
    enabled: true
    deny_list: true
  rules:
  - rule: GTFOBins # https://gtfobins.github.io/#+shell%20+SUID%20+Sudo
    scope: binary_name in
      [
        "aa-exec",
        "awk",
        "busctl",
        "busybox",
        "cabal",
        "choom",
        "cpio",
        "csh",
        "csvtool",
        "debugfs",
        "distcc",
        "docker",
        "ed",
        "emacs",
        "env",
        "expect",
        "find",
        "flock",
        "gawk",
        "gdb",
        "genie",
        "gimp",
        "gtester",
        "hping3",
        "ionice",
        "ispell",
        "jjs",
        "jrunscript",
        "julia",
        "ld.so",
        "less",
        "logsave",
        "lua",
        "make",
        "mawk",
        "minicom",
        "more",
        "msgfilter",
        "multitime",
        "nawk",
        "ncftp",
        "nice",
        "nmap",
        "node",
        "nohup",
        "openvpn",
        "pandoc",
        "perf",
        "perl",
        "pexec",
        "pg",
        "php",
        "python3.12",
        "rc",
        "rlwrap",
        "rsync",
        "ruby3.0",
        "run-parts",
        "rview",
        "rvim",
        "scanmem",
        "sed",
        "setarch",
        "setlock",
        "softlimit",
        "sqlite3",
        "ssh-agent",
        "sshpass",
        "start-stop-daemon",
        "stdbuf",
        "strace",
        "taskset",
        "tclsh",
        "time",
        "timeout",
        "unshare",
        "vagrant",
        "view",
        "vim",
        "vimdiff",
        "watch",
        "wget",
        "xargs",
        "xdotool"
      ]
    event: name in ["sh", "bash", "dash", "zsh"] AND euid == 0

