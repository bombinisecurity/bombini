lists:
  - list: shells
    items: ["bash", "sh", "dash"]
  - list: sensitive_files
    items: ["passwd", "shadow", "sudoers"]

macros:
  - macro: is_shell
    condition: parent_binary_name in shells

file_open:
  enabled: true
  rules:
  - rule: ShellReadsSensitive
    scope: is_shell
    event: path_prefix == "/etc" AND name in sensitive_files

